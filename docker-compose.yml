version: '3.8'

services:

  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: vehiculos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: Sucursal
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456789
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vehiculos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-p123456789"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Spring Boot en Tomcat
  app:
    build: .
    container_name: vehiculos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/Sucursal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrival=true
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=123456789
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vehiculos-network

volumes:
  mysql_data:

networks:
  vehiculos-network:
    driver: bridge
